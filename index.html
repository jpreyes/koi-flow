<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>koi-flow · Estudios hidrológico-hidráulicos</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M3 14c3-3 6 3 9 0s6-3 9 0' fill='none' stroke='%231ea7c5' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M3 18c3-3 6 3 9 0s6-3 9 0' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1018">
  <script>
    try { document.documentElement.dataset.theme = localStorage.getItem('koi_theme') || 'light'; } catch (e) {}
  </script>
  <link rel="stylesheet" href="lib/leaflet/leaflet.css?v=2">
  <link rel="stylesheet" href="css/koi.css?v=2">
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three/three.module.js",
      "three/addons/": "./lib/three/addons/"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <header id="menubar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 14c3-3 6 3 9 0s6-3 9 0" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
        <path d="M3 18c3-3 6 3 9 0s6-3 9 0" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      koi-flow <span class="brand-sub">Licencia demo</span>
    </div>
    <nav id="appmenu" aria-label="Menú principal">
      <div class="menu" data-menu="archivo"><button class="menu-btn" type="button">Archivo</button>
        <div class="menu-dd">
          <button class="menu-item" data-action="proj-nuevo">Nuevo proyecto</button>
          <button class="menu-item" data-action="proj-demo">Cargar demo (Tarapacá)</button>
          <button class="menu-item" data-action="proj-abrir">Abrir proyecto…</button>
          <button class="menu-item" data-action="proj-guardar">Guardar proyecto</button>
          <div class="menu-sep"></div>
          <button class="menu-item" data-action="importar">Importar KMZ / KML…</button>
          <button class="menu-item" data-action="bati">Importar batimetría (DXF)…</button>
          <div class="menu-sep"></div>
          <button class="menu-item" data-action="informe">Generar informe (PDF)</button>
        </div></div>
      <div class="menu" data-menu="editar"><button class="menu-btn" type="button">Editar</button>
        <div class="menu-dd">
          <button class="menu-item" data-action="add-punto">Agregar punto de análisis</button>
          <button class="menu-item" data-action="add-etiqueta">Agregar etiqueta referencial…</button>
          <div class="menu-sep"></div>
          <button class="menu-item" data-action="config">Configuración…</button>
        </div></div>
      <div class="menu" data-menu="ver"><button class="menu-btn" type="button">Ver</button>
        <div class="menu-dd">
          <button class="menu-item" data-action="ver-2d">Mapa 2D</button>
          <button class="menu-item" data-action="ver-3d">Relieve 3D</button>
          <div class="menu-sep"></div>
          <button class="menu-item" data-action="tema">Cambiar tema (claro / oscuro)</button>
        </div></div>
      <div class="menu" data-menu="analisis"><button class="menu-btn" type="button">Análisis</button>
        <div class="menu-dd">
          <button class="menu-item" data-action="tab-cuenca">Cuenca y morfometría</button>
          <button class="menu-item" data-action="tab-hidro">Hidrología</button>
          <button class="menu-item" data-action="tab-hidraulica">Hidráulica (batimetría · 1D / 2D)</button>
          <button class="menu-item" data-action="tab-estructuras">Estructuras (puentes / alcantarillas)</button>
        </div></div>
      <div class="menu" data-menu="ayuda"><button class="menu-btn" type="button">Ayuda</button>
        <div class="menu-dd">
          <button class="menu-item" data-action="ayuda">Ayuda y tutorial</button>
          <button class="menu-item" data-action="acerca">Acerca de koi-flow</button>
        </div></div>
    </nav>
  </header>

  <div id="main">
    <aside id="tree" aria-label="Proyecto y sectores"></aside>
    <div id="tree-resize" class="v-resize" title="Arrastra para redimensionar"></div>

    <div id="viewport-wrap">
      <div id="viewport-container"></div>
      <div id="map-container" aria-label="Mapa 2D"></div>
      <div id="sel-card">
        <div id="sel-name">—</div>
        <div id="sel-info"></div>
      </div>
    </div>
  </div>

</div>

<!-- Portada / pantalla de carga -->
<div id="landing">
  <div class="landing-card">
    <svg viewBox="0 0 120 80" width="120" height="80" aria-hidden="true">
      <path d="M5 38c12-12 24 12 36 0s24-12 36 0 24 12 36 0" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
      <path d="M5 52c12-12 24 12 36 0s24-12 36 0 24 12 36 0" fill="none" stroke="var(--teal)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    </svg>
    <h1 class="hero-title">koi-flow</h1>
    <p class="hero-tag">Hidrología, hidráulica y socavación · Manual de Carreteras</p>
    <div id="load-wrap">
      <div id="load-bar-bg"><div id="load-bar"></div></div>
      <div id="load-row"><span id="load-status">Iniciando…</span><span id="load-pct">0%</span></div>
    </div>
  </div>
</div>
<script>
  window.__koiCloseLanding = function () {
    const l = document.getElementById('landing'); if (!l || l.classList.contains('exit')) return;
    l.classList.add('exit'); setTimeout(function () { l.remove(); }, 600);
  };
  setTimeout(function () { window.__koiCloseLanding(); }, 20000);
</script>

<script src="lib/leaflet/leaflet.js?v=2"></script>
<script>
  window.__koiToggleTheme = function () {
    var d = document.documentElement, next = d.dataset.theme === 'dark' ? 'light' : 'dark';
    d.dataset.theme = next; try { localStorage.setItem('koi_theme', next); } catch (e) {}
  };
</script>
<script type="module" src="js/koi/boot.js?v=2"></script>
<script>
  if ('serviceWorker' in navigator && !navigator.webdriver) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
